name: Task 2 - Terminal commands report

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/task2-terminal-commands-report.yml'
      - 'scripts/task2_commands_report.sh'
      - 'scripts/build_pdf_report.py'
      - 'scripts/text_to_png.py'

jobs:
  build-report-task2:
    runs-on: ubuntu-latest
    env:
      REPORT_AUTHOR: Миленькова Ивана
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y man-db procps python3-pil

      - name: Generate PDF report
        run: bash scripts/task2_commands_report.sh

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: task2-report-pdf
          path: reports/task2/report.pdf
