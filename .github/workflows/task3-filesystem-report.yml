name: Task 3 - Filesystem image report

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/task3-filesystem-report.yml'
      - 'scripts/task3_filesystem_report.sh'
      - 'scripts/text_to_png.py'

jobs:
  build-report-task3:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs util-linux python3-pil

      - name: Generate report
        run: bash scripts/task3_filesystem_report.sh

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: task3-report
          path: reports/task3
